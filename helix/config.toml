# -----------------------------------------------------------------------------
# themes
# -----------------------------------------------------------------------------
    
#theme = "onedark"
theme = "gruvbox"


# -----------------------------------------------------------------------------
# editor
# -----------------------------------------------------------------------------

[editor]
line-number = "relative"
mouse = false
true-color = true
# indent-style = "2"  # this isn't an option, but it should be

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true

# At most one section each of 'keys.normal', 'keys.insert' and 'keys.select'
# Refer to keymap here: https://docs.helix-editor.com/keymap.html


# -----------------------------------------------------------------------------
# keymaps
# -----------------------------------------------------------------------------

[keys.insert]
#j = { k = "normal_mode" }
#k = { j = "normal_mode" }

  
[keys.normal]
# NOTE that some commands are unchangeable:
#  . = repeat last change

# a = "goto_line_start"             # stock: Home
# f = "goto_line_end"               # stock: End
o = "extend_line"                 # stock: x; i.e. this selects a line

B = "goto_prev_paragraph"
b = "goto_next_paragraph"

p = "move_prev_long_word_start"		
#"semicolon" = "move_next_long_word_start"  	

J = "copy_selection_on_next_line"
K = "copy_selection_on_prev_line"

c = "toggle_comments"    					# stock: Ctrl-c

e = "change_selection"
a = "select_all"

'[' = "unindent"                  # stock: Shift+, (i.e. <)
']' = "indent"                    # stock: Shift+. (i.e. >)

# these two commands increment/decrement the number under the cursor
# not sure why these aren't working...
#"-" = "decrement"                  # stock: Ctrl-a
#"=" = "increment"                  # stock: Ctrl-x

