# -----------------------------------------------------------------------------
# themes
# -----------------------------------------------------------------------------
    
#theme = "onedark"
theme = "gruvbox"

# -----------------------------------------------------------------------------
# editor
# -----------------------------------------------------------------------------

[editor]
line-number = "relative"
mouse = false
true-color = true
# indent-style = "2"  # this isn't an option, but it should be

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true

# At most one section each of 'keys.normal', 'keys.insert' and 'keys.select'
# Refer to keymap here: https://docs.helix-editor.com/keymap.html

# -----------------------------------------------------------------------------
# keymaps
# -----------------------------------------------------------------------------

[keys.insert]
#j = { k = "normal_mode" }
#k = { j = "normal_mode" }

  
[keys.normal]
# NOTE that some commands are unchangeable:
#  . = repeat last change

L = "append_to_line"
H = "prepend_to_line"
a = "kill_to_line_start"
s = "kill_to_line_end"
b = "move_prev_long_word_start"		
f = "move_next_long_word_start"  	
N = "open_above"
n = "open_below"
o = "extend_line"                
B = "goto_prev_paragraph"
F = "goto_next_paragraph"
J = "copy_selection_on_next_line"
K = "copy_selection_on_prev_line"
c = "toggle_comments"    				
e = "change_selection"  # I think of this as "edit" -- delete and then enter insert mode in one movement. Also it's the same finger as i on the right hand.
'[' = "unindent"                  # stock: Shift+, (i.e. <)
']' = "indent"                    # stock: Shift+. (i.e. >)

# these two commands increment/decrement the number under the cursor
# not sure why these aren't working...
#"-" = "decrement"                  # stock: Ctrl-a
#"=" = "increment"                  # stock: Ctrl-x

