# See https://wiki.hyprland.org/Configuring/Monitors/
# `hyprctl monitors`
#
# NOTE: logical resolution = physical resolution / scale
# i.e. 2400 = 3840 / 1.6 (i.e. 160% scaled)
#
#           DISPLAY     RESOLUTION          POSITION    SCALE
#
# Asus ProArt 6k
# 200% looks like 3008x1692
monitor = DP-2, 6016x3384@59.99, 0x0, 2
# monitor = ASUSTek COMPUTER INC PA32QCV T7LMSV009353, 6016x3384@59.99, 0x0, 2

# LG DualUp
# 160% looks like ?
# monitor = DP-3, 2560x2880@59.98, 3008x0, 1.3333334
# monitor = DP-3, 2560x2880@59.98, 3008x0, 1.6, transform, 3 # vertical
monitor = DP-3, 2560x2880@59.98, 3008x0, 1.6 # NOTE: 160% looks like 1600x1800
# monitor = DP-3, 2560x2880@59.98, 3008x0, 2
# monitor = DP-3, 2560x1440@59.98, 3008x0, 1.6 # picture-in-picture mode

# BenQ RD280OU
# monitor = DP-1, 3840x2560@59.98, -3840x0, 1
# monitor = DP-1, 3840x2560@59.98, -2400x0, 1.6 # NOTE: 160% looks like 2400x1600
# monitor = DP-1, 3840x2560@59.98, -1600x0, 1.6, transform, 1 # NOTE: vertical, 200% looks like 1600x2400 
# monitor = DP-1, 3840x2560@59.98, -1920x0, 2 # NOTE: 200% looks like 1920x1280
# monitor = DP-1, 3840x2560@59.98, -1280x0, 2, transform, 1 # NOTE: vertical, 200% looks like 1280x1920
