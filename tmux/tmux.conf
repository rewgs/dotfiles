# ----------------- BASIC CHANGES ----------------- 

# remap prefix from 'ctrl+b' to 'ctrl+p'
unbind C-b
set -g prefix C-p
bind-key C-p send-prefix

# force tmux to assume that the terminal supports 256 colors
set -g default-terminal "tmux-256color"


# split panes using | and -
bind h split-window -h
bind v split-window -v
unbind '"'
unbind % 


# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf


# removes delay when switching from Insert mode to Normal mode in (n)vim/helix/etc
set -sg escape-time 0


# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# Enable mouse control (clickable windows, panes, resizable panes)
# tmux version 2.0 and below:
#set -g mouse-select-window on
#set -g mouse-select-pane on
#set -g mouse-resize-pane on
# tmux version 2.1 and above:
set -g mouse on



# ----------------- INTERFACE ----------------- 

# onedark
# run-shell -b $HOME/dotfiles/tmux/tmux-themes/ tmux-onedark-theme.tmux



# ----------------- TMUX PLUGIN MANAGER----------------- 
# (make sure that this is always the bottom section of this file!)

# to install a plugin (after writing config here): prefix + shift+i

# TPM (required)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# themes
# onedark
#set -g @plugin 'odedlaz/tmux-onedark-theme'

# gruvbox
set -g @plugin 'egel/tmux-gruvbox'    # this is required
set -g @tmux-gruvbox 'dark'           # choose this line or next
#set -g @tmux-gruvbox 'light'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
